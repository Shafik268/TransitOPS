<!DOCTYPE html>
<html>
<head>
    <title>VelocityOne | Fleet Login</title>
    <style>
        body { background: #fcf8f2; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 8px; border: 1px solid #d7c5b4; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #d7c5b4; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #ffd3b6; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>VelocityOne Login</h2>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
