<!DOCTYPE html>
<html lang="en">
<head>
    <title>VelocityOne | Fleet Operations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
</head>
<body>
    <div class="view-container">
        <div class="sidebar">
            <div class="sidebar-brand">
                <h2 style="color: black; font-weight: 800;">VelocityOne</h2>
            </div>
            <nav class="sidebar-menu">
                <a href="/" class="menu-item {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="/vehicles" class="menu-item">Vehicle Registry</a>
                <a href="/dispatch" class="menu-item">Trip Dispatcher</a>
                <a href="/maintenance" class="menu-item">Maintenance</a>
                <a href="/analytics" class="menu-item">Reports & Analytics</a>
            </nav>
        </div>
        <div class="main-content">
            <header class="content-header"><h2>{% block view_title %}{% endblock %}</h2></header>
            <main style="padding: 30px;">{% block content %}{% endblock %}</main>
        </div>
    </div>
</body>
</html>
